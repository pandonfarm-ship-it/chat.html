<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smac Messenger</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0e1621; --header: #17212b; --my-msg: #2b5278; --friend-msg: #182533; --accent: #5288c1; --text: #f5f5f5; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        #header { background: var(--header); padding: 10px 15px; border-bottom: 1px solid #000; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 13px; color: var(--accent); font-weight: 500; }
        #my-id-label { font-size: 11px; color: #888; background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 6px; cursor: pointer; }

        #chat-window { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); }
        
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 15px; line-height: 1.3; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.3); animation: fadeIn 0.15s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.my { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 4px; }
        .msg.friend { align-self: flex-start; background: var(--friend-msg); border-bottom-left-radius: 4px; }
        
        .meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 10px; opacity: 0.5; margin-top: 2px; }

        #bottom-bar { background: var(--header); padding: 10px 15px; border-top: 1px solid #000; }
        .input-row { display: flex; gap: 12px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; }
        button { color: var(--accent); background: none; border: none; font-weight: bold; font-size: 15px; cursor: pointer; text-transform: uppercase; }
        
        #typing { font-size: 12px; color: var(--accent); height: 16px; margin-bottom: 4px; padding-left: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="header">
    <div>
        <div style="font-weight: bold; font-size: 16px;">Smac Online</div>
        <div id="status-label" class="status">подключение...</div>
    </div>
    <div id="my-id-label" onclick="copyId()">ID: <span id="my-id">...</span></div>
</div>

<div id="chat-window">
    <div id="welcome-msg" style="margin: auto; background: rgba(0,0,0,0.4); padding: 10px 20px; border-radius: 20px; font-size: 13px; color: #888; text-align: center;">
        Введите ID друга для начала безопасного чата
    </div>
</div>

<div id="typing"></div>

<div id="bottom-bar">
    <div id="setup-ui" class="input-row">
        <input type="text" id="target-id" placeholder="ID собеседника...">
        <button onclick="connectToFriend()">СВЯЗЬ</button>
    </div>
    <div id="chat-ui" class="input-row hidden">
        <input type="text" id="message-text" placeholder="Сообщение..." oninput="sendT()">
        <button onclick="sendMessage()">ОТПР.</button>
    </div>
</div>

<script>
    const chatWin = document.getElementById('chat-window');
    const myIdDisplay = document.getElementById('my-id');
    const statusLabel = document.getElementById('status-label');
    const setupUi = document.getElementById('setup-ui');
    const chatUi = document.getElementById('chat-ui');
    const typingLabel = document.getElementById('typing');
    
    let myId = 'smac-' + Math.floor(Math.random() * 89999 + 10000);
    let conn = null;
    let tTimer;

    // Усиленные настройки для пробития 4G блокировок
    const peer = new Peer(myId, {
        host: '0.peerjs.com', secure: true, port: 443,
        config: { 
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ] 
        }
    });

    function copyId() {
        navigator.clipboard.writeText(myIdDisplay.innerText);
        alert("ID скопирован!");
    }

    peer.on('open', id => {
        myIdDisplay.innerText = id;
        statusLabel.innerText = "в сети";
    });

    // Если кто-то подключается к нам
    peer.on('connection', c => {
        conn = c;
        setupChat();
    });

    function connectToFriend() {
        const tid = document.getElementById('target-id').value.trim();
        if (tid) {
            statusLabel.innerText = "соединение...";
            // Сброс старого зависшего соединения перед новым
            if(conn) conn.close(); 
            conn = peer.connect(tid, { reliable: true });
            setupChat();
            
            // Таймер сброса: если за 10 сек не подключилось - вернуть статус
            setTimeout(() => {
                if(statusLabel.innerText === "соединение...") {
                    statusLabel.innerText = "ошибка (попробуйте еще раз)";
                    if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
                }
            }, 10000);
        }
    }

    function setupChat() {
        conn.on('open', () => {
            statusLabel.innerText = "онлайн";
            document.getElementById('welcome-msg').classList.add('hidden');
            setupUi.classList.add('hidden');
            chatUi.classList.remove('hidden');
        });

        conn.on('data', data => {
            if(data === "___T") {
                typingLabel.innerText = "печатает...";
                clearTimeout(tTimer);
                tTimer = setTimeout(() => typingLabel.innerText = "", 2000);
            } else {
                typingLabel.innerText = "";
                addMsg(data, 'friend');
                if(navigator.vibrate) navigator.vibrate(60);
            }
        });

        conn.on('close', () => {
            statusLabel.innerText = "связь оборвана";
            location.reload(); // Перезагрузка для стабильности
        });
    }

    function sendT() { if(conn && conn.open) conn.send("___T"); }

    function sendMessage() {
        const input = document.getElementById('message-text');
        if (input.value.trim() && conn && conn.open) {
            conn.send(input.value);
            addMsg(input.value, 'my');
            input.value = '';
        }
    }

    function addMsg(text, type) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `${text} <div class="meta"><span>${time}</span>${type==='my'?'<span>✓✓</span>':''}</div>`;
        chatWin.appendChild(div);
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    document.getElementById('message-text').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
