<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smac Ultra</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #007aff; --bg: #000; --text: #fff; --card: #1c1c1e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #header { padding: 10px 15px; background: #121212; border-bottom: 0.5px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #my-id-btn { font-size: 11px; background: #222; padding: 5px 10px; border-radius: 15px; color: var(--accent); cursor: pointer; }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #000; }
        
        /* Сообщения и Фото */
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .msg.my { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .msg.friend { align-self: flex-start; background: #2c2c2e; border-bottom-left-radius: 4px; }
        .msg img { max-width: 100%; border-radius: 10px; display: block; margin: 5px 0; }
        .sticker { width: 120px; height: 120px; object-fit: contain; background: none !important; border: none !important; }

        /* Панель стикеров */
        #sticker-panel { display: none; background: #1c1c1e; padding: 10px; grid-template-columns: repeat(4, 1fr); gap: 10px; border-top: 0.5px solid #333; max-height: 200px; overflow-y: auto; }
        .stk-item { font-size: 30px; text-align: center; cursor: pointer; transition: 0.2s; }
        .stk-item:active { transform: scale(1.2); }

        /* Футер */
        #footer { padding: 10px; background: #121212; border-top: 0.5px solid #333; }
        .input-row { display: flex; gap: 8px; align-items: center; max-width: 600px; margin: 0 auto; }
        .btn-icon { font-size: 20px; color: var(--accent); cursor: pointer; padding: 5px; }
        .input-field { flex: 1; background: #222; border-radius: 20px; padding: 8px 15px; display: flex; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: #fff; outline: none; font-size: 16px; }
        #send-btn { background: var(--accent); border: none; width: 32px; height: 32px; border-radius: 50%; color: #fff; font-weight: bold; cursor: pointer; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="header">
    <div><b style="font-size: 17px;">Smac Ultra</b><br><span id="status" style="font-size:12px; color:#555;">сеть...</span></div>
    <div id="my-id-btn" onclick="copyId()">ID: <span id="my-id">...</span></div>
</div>

<div id="chat-window"></div>

<div id="sticker-panel">
    <div class="stk-item" onclick="sendSticker('🦆')">🦆</div>
    <div class="stk-item" onclick="sendSticker('😎')">😎</div>
    <div class="stk-item" onclick="sendSticker('🔥')">🔥</div>
    <div class="stk-item" onclick="sendSticker('💀')">💀</div>
    <div class="stk-item" onclick="sendSticker('🤖')">🤖</div>
    <div class="stk-item" onclick="sendSticker('👻')">👻</div>
    <div class="stk-item" onclick="sendSticker('👑')">👑</div>
    <div class="stk-item" onclick="sendSticker('🤡')">🤡</div>
</div>

<div id="footer">
    <div id="setup-ui" class="input-row">
        <input type="text" id="target-id" style="background:#222; border-radius:15px; padding:10px;" placeholder="ID друга...">
        <button onclick="connectToFriend()" id="send-btn">→</button>
    </div>

    <div id="chat-ui" class="input-row hidden">
        <span class="btn-icon" onclick="toggleStickers()">😊</span>
        <label class="btn-icon">
            + <input type="file" id="file-input" accept="image/*" class="hidden" onchange="sendImage(this)">
        </label>
        <div class="input-field">
            <input type="text" id="msg-input" placeholder="Cообщение...">
        </div>
        <button onclick="sendText()" id="send-btn">↑</button>
    </div>
</div>

<script>
    const myIdDisp = document.getElementById('my-id');
    const statusLabel = document.getElementById('status');
    const chatWin = document.getElementById('chat-window');
    const stickerPanel = document.getElementById('sticker-panel');
    
    let myId = 'smac-' + Math.floor(Math.random() * 89999 + 10000);
    let conn = null;

    const peer = new Peer(myId, {
        host: '0.peerjs.com', secure: true, port: 443,
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    function copyId() { navigator.clipboard.writeText(myIdDisp.innerText); alert("ID скопирован"); }

    peer.on('open', id => { myIdDisp.innerText = id; statusLabel.innerText = "в сети"; statusLabel.style.color = "#32d74b"; });
    peer.on('connection', c => { conn = c; setupChat(); });

    function connectToFriend() {
        const tid = document.getElementById('target-id').value;
        if (tid) { conn = peer.connect(tid); setupChat(); }
    }

    function setupChat() {
        conn.on('open', () => {
            statusLabel.innerText = "онлайн";
            document.getElementById('setup-ui').classList.add('hidden');
            document.getElementById('chat-ui').classList.remove('hidden');
        });
        conn.on('data', data => {
            if(data.startsWith('img:')) addMsg(data.replace('img:',''), 'friend', true);
            else if(data.startsWith('stk:')) addMsg(data.replace('stk:',''), 'friend', false, true);
            else addMsg(data, 'friend');
        });
    }

    // Отправка текста
    function sendText() {
        const val = document.getElementById('msg-input').value;
        if(val && conn) { conn.send(val); addMsg(val, 'my'); document.getElementById('msg-input').value=''; }
    }

    // Отправка стикера
    function toggleStickers() { stickerPanel.style.display = stickerPanel.style.display === 'grid' ? 'none' : 'grid'; }
    function sendSticker(emoji) {
        if(conn) { conn.send('stk:' + emoji); addMsg(emoji, 'my', false, true); toggleStickers(); }
    }

    // Отправка фото
    function sendImage(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = e => {
            const base64 = e.target.result;
            conn.send('img:' + base64);
            addMsg(base64, 'my', true);
        };
        reader.readAsDataURL(file);
    }

    function addMsg(content, type, isImg = false, isStk = false) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if(isImg) div.innerHTML = `<img src="${content}">`;
        else if(isStk) { div.innerText = content; div.classList.add('sticker'); div.style.fontSize = "80px"; }
        else div.innerText = content;
        
        chatWin.appendChild(div);
        chatWin.scrollTop = chatWin.scrollHeight;
    }
</script>
</body>
</html>
