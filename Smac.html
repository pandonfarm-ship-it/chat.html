<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smac Premium</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #007aff; --bg: #000; --text: #fff; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #header { padding: 12px 15px; background: #121212; border-bottom: 0.5px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #status { font-size: 12px; color: #555; }
        #my-id-box { font-size: 11px; background: #222; padding: 5px 10px; border-radius: 15px; cursor: pointer; color: var(--accent); }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 18px; font-size: 15px; animation: pop 0.2s ease; }
        @keyframes pop { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .msg.my { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .msg.friend { align-self: flex-start; background: #2c2c2e; border-bottom-left-radius: 4px; }
        #footer { padding: 15px; background: #121212; border-top: 0.5px solid #333; }
        .input-box { display: flex; background: #222; border-radius: 25px; padding: 5px 15px; align-items: center; }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; padding: 8px 0; }
        button { background: var(--accent); color: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="header">
    <div>
        <div style="font-weight: bold;">Smac Premium</div>
        <div id="status">инициализация...</div>
    </div>
    <div id="my-id-box" onclick="copyId()">ID: <span id="my-id">...</span></div>
</div>

<div id="chat-window">
    <div id="info" style="margin: auto; color: #444; text-align: center;">Введите ID и нажмите стрелку</div>
</div>

<div id="footer">
    <div id="setup-ui" class="input-box">
        <input type="text" id="target-id" placeholder="ID друга...">
        <button onclick="connectToFriend()">→</button>
    </div>
    <div id="chat-ui" class="input-box hidden">
        <input type="text" id="message-text" placeholder="Сообщение...">
        <button onclick="sendMessage()">↑</button>
    </div>
</div>

<script>
    const myIdDisp = document.getElementById('my-id');
    const statusLabel = document.getElementById('status');
    const setupUi = document.getElementById('setup-ui');
    const chatUi = document.getElementById('chat-ui');
    const chatWin = document.getElementById('chat-window');
    
    let myId = 'smac-' + Math.floor(Math.random() * 89999 + 10000);
    let conn = null;

    // Сверх-мощные настройки для пробития NAT оператора
    const peer = new Peer(myId, {
        host: '0.peerjs.com', secure: true, port: 443,
        config: { 
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' }
            ],
            'iceTransportPolicy': 'all'
        }
    });

    function copyId() { navigator.clipboard.writeText(myIdDisp.innerText); alert("ID скопирован"); }

    peer.on('open', id => { myIdDisp.innerText = id; statusLabel.innerText = "в сети (готов)"; statusLabel.style.color = "#32d74b"; });

    peer.on('connection', c => { conn = c; setupChat(); });

    function connectToFriend() {
        const tid = document.getElementById('target-id').value.trim();
        if (tid) {
            statusLabel.innerText = "прорыв блока...";
            statusLabel.style.color = "#ff9f0a";
            conn = peer.connect(tid, { reliable: true });
            setupChat();
            
            // Если через 7 секунд всё еще "прорыв", значит оператор стеной стоит
            setTimeout(() => {
                if(statusLabel.innerText === "прорыв блока...") {
                    statusLabel.innerText = "блок 4G! Перезайдите в интернет";
                    statusLabel.style.color = "#ff453a";
                }
            }, 7000);
        }
    }

    function setupChat() {
        conn.on('open', () => {
            statusLabel.innerText = "онлайн";
            statusLabel.style.color = "#32d74b";
            document.getElementById('info').classList.add('hidden');
            setupUi.classList.add('hidden');
            chatUi.classList.remove('hidden');
        });
        conn.on('data', data => addMsg(data, 'friend'));
        conn.on('error', () => { statusLabel.innerText = "ошибка сети"; location.reload(); });
    }

    function sendMessage() {
        const input = document.getElementById('message-text');
        if (input.value.trim() && conn) {
            conn.send(input.value);
            addMsg(input.value, 'my');
            input.value = '';
        }
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatWin.appendChild(div);
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    document.getElementById('message-text').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
