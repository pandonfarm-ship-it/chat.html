<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smac Telegram Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --tg-bg: #0f1721; --tg-header: #17212b; --tg-my-msg: #2b5278; --tg-friend-msg: #182533; --tg-accent: #5288c1; --tg-text: #f5f5f5; }
        body { margin: 0; background: var(--tg-bg); color: var(--tg-text); font-family: -apple-system, system-ui, Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Шапка в стиле ТГ */
        #header { background: var(--tg-header); padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #000; z-index: 10; }
        .user-info { display: flex; flex-direction: column; }
        .status { font-size: 13px; color: var(--tg-accent); }
        #my-id-btn { font-size: 11px; color: #888; cursor: pointer; text-decoration: underline; }

        /* Окно чата */
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); }
        
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 15px; position: relative; word-wrap: break-word; line-height: 1.3; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        .msg.my { align-self: flex-end; background: var(--tg-my-msg); border-bottom-right-radius: 4px; }
        .msg.friend { align-self: flex-start; background: var(--tg-friend-msg); border-bottom-left-radius: 4px; }
        
        .info-row { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 2px; font-size: 10px; opacity: 0.6; }

        /* Нижняя панель */
        #bottom-panel { background: var(--tg-header); padding: 8px 12px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #000; }
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; padding: 10px 0; }
        button { color: var(--tg-accent); background: none; border: none; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; }
        
        #typing { position: absolute; bottom: 70px; left: 15px; font-size: 12px; color: var(--tg-accent); height: 15px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="header">
    <div class="user-info">
        <span style="font-weight: bold;">Smac Messenger</span>
        <span id="status-text" class="status">ожидание сети...</span>
    </div>
    <div id="my-id-btn" onclick="copyId()">ID: <span id="my-id">...</span></div>
</div>

<div id="chat-window">
    <div style="margin: auto; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; font-size: 12px; color: #aaa;">Выберите собеседника для начала чата</div>
</div>

<div id="typing"></div>

<div id="bottom-panel">
    <div id="setup-ui" style="display: flex; width: 100%; gap: 10px;">
        <input type="text" id="target-id" placeholder="Введите ID друга...">
        <button onclick="connectToFriend()">СВЯЗЬ</button>
    </div>

    <div id="chat-ui" class="hidden" style="display: flex; width: 100%; gap: 10px;">
        <input type="text" id="message-text" placeholder="Сообщение..." oninput="sendTyping()">
        <button onclick="sendMessage()">ОТПР.</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const myIdDisplay = document.getElementById('my-id');
    const statusText = document.getElementById('status-text');
    const setupUi = document.getElementById('setup-ui');
    const chatUi = document.getElementById('chat-ui');
    const typingIndicator = document.getElementById('typing');
    
    let myPeerId = 'smac-' + Math.floor(Math.random() * 89999 + 10000);
    let activeConn = null;
    let typingTimer;

    const peer = new Peer(myPeerId, {
        host: '0.peerjs.com', secure: true, port: 443,
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    function copyId() {
        navigator.clipboard.writeText(myIdDisplay.innerText);
        alert("ID скопирован!");
    }

    peer.on('open', id => {
        myIdDisplay.innerText = id;
        statusText.innerText = "в сети";
    });

    peer.on('connection', conn => {
        activeConn = conn;
        setupChat();
    });

    function connectToFriend() {
        const target = document.getElementById('target-id').value;
        if (target) {
            statusText.innerText = "соединение...";
            activeConn = peer.connect(target);
            setupChat();
        }
    }

    function setupChat() {
        activeConn.on('open', () => {
            statusText.innerText = "онлайн";
            setupUi.classList.add('hidden');
            chatUi.classList.remove('hidden');
            addMessage("Система: Соединение установлено", 'friend');
        });

        activeConn.on('data', data => {
            if(data === "___T") {
                typingIndicator.innerText = "печатает...";
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => typingIndicator.innerText = "", 2000);
            } else {
                typingIndicator.innerText = "";
                addMessage(data, 'friend');
                if(navigator.vibrate) navigator.vibrate(50);
            }
        });
    }

    function sendTyping() {
        if(activeConn && activeConn.open) activeConn.send("___T");
    }

    function sendMessage() {
        const input = document.getElementById('message-text');
        const text = input.value.trim();
        if (text && activeConn) {
            activeConn.send(text);
            addMessage(text, 'my');
            input.value = '';
        }
    }

    function addMessage(text, type) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `${text} <div class="info-row"><span>${time}</span>${type==='my'?'<span>✓✓</span>':''}</div>`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    document.getElementById('message-text').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
    document.getElementById('target-id').addEventListener('keypress', (e) => { if(e.key === 'Enter') connectToFriend(); });
</script>
</body>
</html>
