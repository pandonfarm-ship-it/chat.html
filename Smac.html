<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smac OS v2.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --main-green: #00ff41; --bg-dark: #050505; --msg-in: #1a1a1a; }
        body { margin: 0; background: var(--bg-dark); color: var(--main-green); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        #header { background: rgba(0, 30, 0, 0.9); padding: 15px; border-bottom: 1px solid var(--main-green); text-align: center; }
        #my-id { color: #fff; font-family: monospace; background: rgba(0,255,0,0.15); padding: 5px 12px; border-radius: 6px; cursor: pointer; border: 1px dashed var(--main-green); display: inline-block; margin-top: 5px; }
        
        /* CHAT WINDOW */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: radial-gradient(circle at center, #0a0f0a 0%, #000 100%); }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; position: relative; animation: pop 0.2s ease; word-wrap: break-word; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .msg.my { align-self: flex-end; background: var(--main-green); color: #000; border-bottom-right-radius: 4px; font-weight: 500; }
        .msg.friend { align-self: flex-start; background: var(--msg-in); color: #e0e0e0; border: 1px solid #333; border-bottom-left-radius: 4px; }
        
        .time { font-size: 10px; opacity: 0.5; display: block; margin-top: 5px; text-align: right; }
        .my .time { color: #000; opacity: 0.7; }

        /* INPUT AREA */
        #ui-layer { background: #111; padding: 15px; border-top: 1px solid #222; }
        .input-group { display: flex; gap: 10px; align-items: center; }
        input { flex: 1; background: #000; border: 1px solid #333; color: var(--main-green); padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        input:focus { border-color: var(--main-green); }
        
        button { background: var(--main-green); border: none; color: #000; padding: 12px 20px; font-weight: bold; border-radius: 25px; cursor: pointer; }
        
        #typing-indicator { height: 20px; font-size: 12px; padding-left: 20px; color: #555; font-style: italic; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-size: 10px; opacity: 0.6; letter-spacing: 1px;">ВАШ ID (НАЖМИ ЧТОБЫ КОПИРОВАТЬ)</div>
    <span id="my-id" onclick="copyMyId()">ГЕНЕРАЦИЯ...</span>
</div>

<div id="chat-window">
    <div style="text-align: center; font-size: 11px; color: #333; margin-top: 100px;">БЕЗОПАСНОЕ СОЕДИНЕНИЕ P2P</div>
</div>

<div id="typing-indicator"></div>

<div id="ui-layer">
    <div id="conn-ui" class="input-group">
        <input type="text" id="target-id" placeholder="ID друга для связи...">
        <button onclick="connectToFriend()">СВЯЗЬ</button>
    </div>

    <div id="msg-ui" class="input-group" style="display: none;">
        <input type="text" id="message-text" placeholder="Сообщение..." oninput="notifyTyping()">
        <button onclick="sendMessage()">ОТПР.</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const myIdDisplay = document.getElementById('my-id');
    const connUi = document.getElementById('conn-ui');
    const msgUi = document.getElementById('msg-ui');
    const typingIndicator = document.getElementById('typing-indicator');
    
    let myPeerId = 'smac-' + Math.floor(Math.random() * 89999 + 10000);
    let activeConn = null;
    let typingTimer;

    const peer = new Peer(myPeerId, {
        host: '0.peerjs.com', secure: true, port: 443,
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    function copyMyId() {
        navigator.clipboard.writeText(myIdDisplay.innerText);
        alert("ID скопирован!");
    }

    peer.on('open', id => myIdDisplay.innerText = id);

    peer.on('connection', conn => {
        activeConn = conn;
        setupChat();
    });

    function connectToFriend() {
        const target = document.getElementById('target-id').value;
        if (target) {
            activeConn = peer.connect(target);
            setupChat();
        }
    }

    function setupChat() {
        activeConn.on('open', () => {
            connUi.style.display = 'none';
            msgUi.style.display = 'flex';
            addMessage("Система: Связь установлена!", 'friend');
        });

        activeConn.on('data', data => {
            if(data === "___TYPING___") {
                typingIndicator.innerText = "Друг печатает...";
                clearTimeout(typingTimer);
                typingTimer = setTimeout(() => typingIndicator.innerText = "", 1500);
            } else {
                typingIndicator.innerText = "";
                addMessage(data, 'friend');
                if(navigator.vibrate) navigator.vibrate(100);
            }
        });
    }

    function notifyTyping() {
        if(activeConn && activeConn.open) activeConn.send("___TYPING___");
    }

    function sendMessage() {
        const input = document.getElementById('message-text');
        const text = input.value.trim();
        if (text && activeConn) {
            activeConn.send(text);
            addMessage(text, 'my');
            input.value = '';
        }
    }

    function addMessage(text, type) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `${text} <span class="time">${time}</span>`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    document.getElementById('message-text').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
