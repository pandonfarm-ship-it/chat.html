<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smac OS | Messenger</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --main-color: #00ff41; --bg-dark: #0a0a0a; --msg-friend: #1a1a1a; }
        body { margin: 0; background: var(--bg-dark); color: var(--main-color); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Шапка */
        #header { background: rgba(0, 20, 0, 0.95); padding: 15px; border-bottom: 1px solid var(--main-color); text-align: center; box-shadow: 0 5px 15px rgba(0,255,0,0.1); }
        #my-id { color: #fff; font-weight: bold; background: rgba(0,255,0,0.1); padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px dashed var(--main-color); }
        
        /* Окно чата */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; background: radial-gradient(circle at center, #0d1117 0%, #000 100%); }
        
        /* Сообщения */
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 18px; font-size: 15px; position: relative; animation: slideIn 0.2s ease-out; line-height: 1.4; }
        @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .msg.my { align-self: flex-end; background: var(--main-color); color: #000; border-bottom-right-radius: 2px; box-shadow: 0 4px 10px rgba(0,255,0,0.2); }
        .msg.friend { align-self: flex-start; background: var(--msg-friend); color: #eee; border: 1px solid #333; border-bottom-left-radius: 2px; }
        
        .time { font-size: 9px; opacity: 0.6; margin-top: 4px; display: block; text-align: right; }
        
        /* Индикатор печатания */
        #typing { font-size: 12px; color: #555; font-style: italic; margin-left: 20px; height: 20px; }

        /* Панель ввода */
        #ui-layer { background: #111; padding: 15px; border-top: 1px solid #222; }
        .input-group { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; }
        input { flex: 1; background: #000; border: 1px solid #333; color: var(--main-color); padding: 12px 15px; border-radius: 25px; outline: none; font-size: 16px; transition: 0.3s; }
        input:focus { border-color: var(--main-color); box-shadow: 0 0 5px var(--main-color); }
        
        button { background: var(--main-color); border: none; color: #000; padding: 12px 25px; font-weight: bold; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.05); }

        #status-bar { font-size: 10px; text-align: center; margin-top: 10px; color: #444; text-transform: uppercase; }
    </style>
</head>
<body>

<div id="header">
    <div style="font-size: 12px; margin-bottom: 5px; opacity: 0.7;">ВАШ ПЕРСОНАЛЬНЫЙ ID (НАЖМИ ЧТОБЫ КОПИРОВАТЬ)</div>
    <span id="my-id" onclick="copyId()">ГЕНЕРАЦИЯ...</span>
    <div id="status-bar">Ожидание инициализации...</div>
</div>

<div id="chat-window">
    <div style="text-align:center; color:#333; font-size:12px;">Здесь будет история ваших сообщений</div>
</div>

<div id="typing"></div>

<div id="ui-layer">
    <div id="conn-ui" class="input-group">
        <input type="text" id="target-id" placeholder="Введите ID друга...">
        <button onclick="connectToFriend()">СВЯЗЬ</button>
    </div>

    <div id="msg-ui" class="input-group" style="display: none;">
        <input type="text" id="message-text" placeholder="Сообщение..." oninput="sendTyping()">
        <button onclick="sendMessage()">▶</button>
    </div>
</div>

<script>
    const chatWindow = document.getElementById('chat-window');
    const myIdDisplay = document.getElementById('my-id');
    const statusBar = document.getElementById('status-bar');
    const connUi = document.getElementById('conn-ui');
    const msgUi = document.getElementById('msg-ui');
    const typingDisplay = document.getElementById('typing');
    
    let myPeerId = 'smac-' + Math.floor(Math.random() * 89999 + 10000);
    let activeConn = null;
    let typingTimeout;

    const peer = new Peer(myPeerId, {
        host: '0.peerjs.com', secure: true, port: 443,
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    // Копирование ID
    function copyId() {
        navigator.clipboard.writeText(myIdDisplay.innerText);
        alert("ID скопирован!");
    }

    peer.on('open', id => {
        myIdDisplay.innerText = id;
        statusBar.innerText = "Система готова к работе";
    });

    peer.on('connection', conn => {
        activeConn = conn;
        setupChat();
    });

    function connectToFriend() {
        const target = document.getElementById('target-id').value;
        if (target) {
            statusBar.innerText = "Поиск узла...";
            activeConn = peer.connect(target);
            setupChat();
        }
    }

    function setupChat() {
        activeConn.on('open', () => {
            statusBar.innerText = "Канал связи установлен ✅";
            connUi.style.display = 'none';
            msgUi.style.display = 'flex';
        });

        activeConn.on('data', data => {
            if(data === "typing...") {
                typingDisplay.innerText = "Друг печатает...";
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => typingDisplay.innerText = "", 2000);
            } else {
                typingDisplay.innerText = "";
                addMessage(data, 'friend');
                if(navigator.vibrate) navigator.vibrate(100);
            }
        });
    }

    function sendTyping() {
        if(activeConn && activeConn.open) {
            activeConn.send("typing...");
        }
    }

    function sendMessage() {
        const input = document.getElementById('message-text');
        const text = input.value;
        if (text && activeConn) {
            activeConn.send(text);
            addMessage(text, 'my');
            input.value = '';
        }
    }

    function addMessage(text, type) {
        const now = new Date();
        const timeStr = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
        
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `${text} <span class="time">${timeStr}</span>`;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    document.getElementById('message-text').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
