<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smac Messenger</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0e1621; --header: #17212b; --my-msg: #2b5278; --friend-msg: #182533; --accent: #5288c1; --text: #f5f5f5; }
        * { box-sizing: border-box; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Шапка */
        #header { background: var(--header); padding: 10px 15px; border-bottom: 1px solid #000; flex-shrink: 0; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .status { font-size: 13px; color: var(--accent); }
        #my-id-box { font-size: 11px; color: #888; background: rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 4px; cursor: pointer; }

        /* Окно сообщений */
        #chat-window { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://www.transparenttextures.com/patterns/pinstriped-suit.png'); }
        
        .msg { max-width: 75%; padding: 8px 12px; border-radius: 12px; font-size: 15px; position: relative; line-height: 1.3; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        .msg.my { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 4px; }
        .msg.friend { align-self: flex-start; background: var(--friend-msg); border-bottom-left-radius: 4px; }
        
        .meta { display: flex; align-items: center; justify-content: flex-end; gap: 4px; font-size: 10px; opacity: 0.6; margin-top: 2px; }

        /* Панель ввода (Всегда внизу) */
        #bottom-bar { background: var(--header); padding: 10px; flex-shrink: 0; border-top: 1px solid #000; }
        .input-row { display: flex; gap: 10px; align-items: center; max-width: 800px; margin: 0 auto; }
        
        input { flex: 1; background: transparent; border: none; color: #fff; font-size: 16px; outline: none; padding: 5px; }
        button { color: var(--accent); background: none; border: none; font-weight: bold; font-size: 15px; cursor: pointer; text-transform: uppercase; padding: 5px 10px; }
        
        #typing { font-size: 12px; color: var(--accent); height: 16px; margin-bottom: 4px; padding-left: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="header">
    <div class="header-top">
        <div>
            <div style="font-weight: bold;">Smac Online</div>
            <div id="status-label" class="status">ожидание...</div>
        </div>
        <div id="my-id-box" onclick="copyId()">ID: <span id="my-id">...</span></div>
    </div>
</div>

<div id="chat-window">
    <div style="margin: auto; background: rgba(0,0,0,0.4); padding: 6px 12px; border-radius: 15px; font-size: 12px; color: #888;">Введите ID друга снизу, чтобы начать</div>
</div>

<div id="typing"></div>

<div id="bottom-bar">
    <div id="setup-ui" class="input-row">
        <input type="text" id="target-id" placeholder="ID друга...">
        <button onclick="connectToFriend()">СВЯЗЬ</button>
    </div>

    <div id="chat-ui" class="input-row hidden">
        <input type="text" id="message-text" placeholder="Сообщение..." oninput="sendT()">
        <button onclick="sendMessage()">ОТПР.</button>
    </div>
</div>

<script>
    const chatWin = document.getElementById('chat-window');
    const myIdDisplay = document.getElementById('my-id');
    const statusLabel = document.getElementById('status-label');
    const setupUi = document.getElementById('setup-ui');
    const chatUi = document.getElementById('chat-ui');
    const typingLabel = document.getElementById('typing');
    
    let myId = 'smac-' + Math.floor(Math.random() * 89999 + 10000);
    let conn = null;
    let tTimer;

    const peer = new Peer(myId, {
        host: '0.peerjs.com', secure: true, port: 443,
        config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    function copyId() {
        navigator.clipboard.writeText(myIdDisplay.innerText);
        alert("ID скопирован");
    }

    peer.on('open', id => {
        myIdDisplay.innerText = id;
        statusLabel.innerText = "в сети";
    });

    peer.on('connection', c => {
        conn = c;
        setupChat();
    });

    function connectToFriend() {
        const tid = document.getElementById('target-id').value;
        if (tid) {
            statusLabel.innerText = "соединение...";
            conn = peer.connect(tid);
            setupChat();
        }
    }

    function setupChat() {
        conn.on('open', () => {
            statusLabel.innerText = "онлайн";
            setupUi.classList.add('hidden');
            chatUi.classList.remove('hidden');
            addMsg("Система: Соединение установлено", 'friend');
        });

        conn.on('data', data => {
            if(data === "___T") {
                typingLabel.innerText = "печатает...";
                clearTimeout(tTimer);
                tTimer = setTimeout(() => typingLabel.innerText = "", 2000);
            } else {
                typingLabel.innerText = "";
                addMsg(data, 'friend');
                if(navigator.vibrate) navigator.vibrate(50);
            }
        });
    }

    function sendT() { if(conn && conn.open) conn.send("___T"); }

    function sendMessage() {
        const input = document.getElementById('message-text');
        if (input.value && conn) {
            conn.send(input.value);
            addMsg(input.value, 'my');
            input.value = '';
        }
    }

    function addMsg(text, type) {
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = `${text} <div class="meta"><span>${time}</span>${type==='my'?'<span>✓✓</span>':''}</div>`;
        chatWin.appendChild(div);
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    document.getElementById('message-text').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
